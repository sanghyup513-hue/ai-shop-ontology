---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuseki
  namespace: default
  labels:
    app: fuseki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fuseki
  template:
    metadata:
      labels:
        app: fuseki
    spec:
      containers:
      - name: fuseki
        image: stain/jena-fuseki
        # vm1 containerd가 호스트 DNS(127.0.0.53 stub)로 docker.io를 해석하는데
        # 그 경로가 죽으면 :latest + Always는 재시작마다 ImagePullBackOff.
        # 캐시된 이미지를 재사용해 containerd DNS 의존을 제거.
        imagePullPolicy: IfNotPresent
        args:
        - /jena-fuseki/fuseki-server
        - --config=/fuseki-config/fuseki-assembler.ttl
        env:
        - name: ADMIN_PASSWORD
          value: "admin"
        - name: JAVA_OPTIONS
          value: "-Xmx1500m"
        ports:
        - containerPort: 3030
        volumeMounts:
        - name: fuseki-config
          mountPath: /fuseki-config
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        readinessProbe:
          httpGet:
            path: /$/ping
            port: 3030
          initialDelaySeconds: 15
          periodSeconds: 5
      volumes:
      - name: fuseki-config
        configMap:
          name: fuseki-config
---
apiVersion: v1
kind: Service
metadata:
  name: fuseki-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: fuseki
  ports:
  - port: 3030
    targetPort: 3030
    nodePort: 30030
