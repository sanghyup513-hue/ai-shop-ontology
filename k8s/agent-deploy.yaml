apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: default
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      initContainers:
        - name: deps
          image: python:3.12-slim
          command:
            - sh
            - -c
            - pip install --no-cache-dir --target=/deps -r /code/requirements.txt
          volumeMounts:
            - name: code
              mountPath: /code
            - name: deps
              mountPath: /deps
      containers:
        - name: agent
          image: python:3.12-slim
          workingDir: /code
          command: ["sleep", "infinity"]
          env:
            - name: PYTHONPATH
              value: /deps:/code
            - name: CATALOG_DB
              value: /code/catalog.sqlite
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm-api-key
                  key: key
          volumeMounts:
            - name: code
              mountPath: /code
            - name: deps
              mountPath: /deps
      volumes:
        - name: code
          configMap:
            name: agent-code
        - name: deps
          emptyDir: {}
